{% extends "base.html" %}

{% block content %}

<section class="container">

    <h2 class="title">🚀 Mis Proyectos</h2>

    <div class="grid">

        {% for post in posts %}
        <div class="card">
            <h3>{{ post.titulo }}</h3>
            <p>{{ post.descripcion }}</p>
            <a href="/post/{{ post.id }}">Ver proyecto →</a>
        </div>
        {% endfor %}

    </div>

</section>

{% endblock %}
